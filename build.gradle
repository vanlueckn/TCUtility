buildscript {
    repositories {
        maven { url = 'https://files.minecraftforge.net/maven' }
        maven { url "https://plugins.gradle.org/m2/" }
        jcenter()
        mavenCentral()
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:3.+'
        classpath "gradle.plugin.com.matthewprenger:CurseGradle:1.4.0"
    }
}

apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'eclipse'
apply plugin: 'maven-publish'

apply plugin: "com.matthewprenger.cursegradle"

sourceSets{
    main {
        java {
            srcDirs("contentPackLib/src")
        }
    }
}

def ver = System.getenv("APPVEYOR_BUILD_VERSION")
if(ver == null)
	ver = 'dev'

def key = System.getenv("CURSETOKEN")
if(key == null)
	key = 'dev'
curseforge {
  apiKey = key
  project {
    id = '821776'
    changelog = file('changelog.md')
    releaseType = 'release'
    changelogType = 'markdown'
  }
}

version = ver
group = 'com.troblecodings'
archivesBaseName = 'TCUtility-1.14.4'

sourceCompatibility = targetCompatibility = compileJava.sourceCompatibility = compileJava.targetCompatibility = '1.8'

minecraft {
    mappings channel: 'snapshot', version: '20191002-1.14.3'
    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'SCAN,REGISTRIES,REGISTRYDUMP'
            property 'forge.logging.console.level', 'debug'
            mods {
                tcutility {
                    source sourceSets.main
                }
            }
        }

        server {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'SCAN,REGISTRIES,REGISTRYDUMP'
            property 'forge.logging.console.level', 'debug'
            mods {
                tcutility {
                    source sourceSets.main
                }
            }
        }
    }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.14.4-28.2.28'
}

processResources {
    inputs.property "version", project.version

    filesMatching("META-INF/mods.toml") {
        expand "version": project.version
    }

    // Asset-Format-Migration (1.12.2 -> 1.14.4): Original-JSONs unter
    // src/main/resources/ bleiben unveraendert, der Build-Output unter
    // build/resources/main/ wird per Pipeline aus buildSrc/ konvertiert
    // (Forge-Blockstates -> Vanilla-Format, Texture-Keys mit '#'-Prefix,
    // Generator-Models pro substituiertem Variant). Neue Migrationsschritte
    // landen in com.troblecodings.build.AssetMigrations und werden hier
    // einfach an die Pipeline angehangen.
    doLast {
        def pipeline = new com.troblecodings.build.AssetMigrationPipeline()
        pipeline.addAll(com.troblecodings.build.AssetMigrations.mc1_12_to_mc1_14())
        pipeline.run(destinationDir)
        pipeline.report.each { logger.info(it) }
        logger.lifecycle("[asset-migrate] applied ${pipeline.report.size()} resource transforms")
    }
}

jar {
    manifest {
        attributes([
            "Specification-Title": "TCUtility",
            "Specification-Vendor": "Troblecodings",
            "Specification-Version": ver,
            "Implementation-Title": project.name,
            "Implementation-Version": ver,
            "Implementation-Vendor" :"Troblecodings",
            "Implementation-Timestamp": new Date().format("dd-MM-yyyy'T'HH:mm:ssZ")
        ])
    }
}

jar.finalizedBy('reobfJar')
